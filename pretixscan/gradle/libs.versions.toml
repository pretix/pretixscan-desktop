gadulka = { module = "eu.iamkonstantin.kotlin:gadulka", version.ref = "gadulka" }
sarxos-webcam = { module = "com.github.sarxos:webcam-capture", version.ref = "webcam-capture" }
webcam-driver = { module = "io.github.eduramiba:webcam-capture-driver-native", version.ref = "webcam-driver" }
composables-core = { module = "com.composables:core", version.ref = "composables" }
jetbrains-material-icons = { module = "org.jetbrains.compose.material:material-icons-core", version.ref = "jetbrains-material-icons" }
