# Java Util Logging Configuration for pretixSCAN Desktop
# This configuration enables both console logging (for development) and file logging (for distribution packages)
# Global logging level - INFO and above (INFO, WARNING, SEVERE)
.level=INFO
# Handlers - both console and file
handlers=java.util.logging.ConsoleHandler,java.util.logging.FileHandler
############################################################
# Console Handler Configuration (for development)
############################################################
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
############################################################
# File Handler Configuration (for distribution packages)
############################################################
# Log file pattern - uses system property set by initializeLogging()
# The pretixscan.log.dir property is set at runtime to a platform-specific path:
# - Windows: %LOCALAPPDATA%\pretix\pretixscan\Logs\2\
# - macOS: ~/Library/Logs/pretixSCAN/
# - Linux: ~/.cache/pretixscan/log/
java.util.logging.FileHandler.pattern=${pretixscan.log.dir}/pretixscan%u.log
# Limit: 10MB per log file
java.util.logging.FileHandler.limit=10485760
# Keep 5 rotating log files
java.util.logging.FileHandler.count=5
# Append to existing files
java.util.logging.FileHandler.append=true
# Log level for file handler
java.util.logging.FileHandler.level=INFO
# Use simple formatter for readability
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
############################################################
# Formatter Configuration
############################################################
# SimpleFormatter pattern:
# %1$tF %1$tT = date and time (YYYY-MM-DD HH:MM:SS)
# %4$s = log level
# %2$s = logger name
# %5$s = log message
# %6$s = exception stacktrace (if present)
java.util.logging.SimpleFormatter.format=%1$tF %1$tT %4$s [%2$s] %5$s%6$s%n
